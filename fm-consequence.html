<title>FM Consequence Engine</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0e0e0e; color:white; font-family:monospace;
  padding:14px; display:flex; flex-direction:column;
  align-items:center; gap:10px; min-height:100vh;
}
h2 { color:#e8c84a; letter-spacing:3px; font-size:1rem; margin-top:4px; }
.subtitle { color:#444; font-size:0.56rem; letter-spacing:1.5px; text-transform:uppercase; }
.w { width:min(820px,97vw); }

/* Category tabs */
.cat-tabs { display:flex; gap:4px; width:min(820px,97vw); margin-bottom:2px; }
.ctab {
flex:1; padding:7px 4px; text-align:center; font-size:0.62rem;
background:#1a1a1a; border:1px solid #2a2a2a; border-radius:4px;
cursor:pointer; color:#555; transition:all 0.15s; letter-spacing:0.5px;
}
.ctab:hover { border-color:#666; color:#aaa; }
.ctab.active { background:#1a1a10; border-color:#e8c84a; color:#e8c84a; }

/* Instruction grid */
.instr-section { margin-bottom:8px; }
.sec-label {
font-size:0.5rem; color:#444; text-transform:uppercase;
letter-spacing:1.5px; margin-bottom:4px; padding-left:2px;
}
.instr-row { display:flex; gap:3px; flex-wrap:wrap; margin-bottom:3px; }

.instr-btn {
padding:5px 10px; border-radius:4px; font-size:0.62rem;
background:#141414; border:1px solid #222; color:#666;
cursor:pointer; transition:all 0.15s; font-family:monospace;
position:relative;
}
.instr-btn:hover { border-color:#888; color:#ccc; }
.instr-btn.selected { background:#1a1a10; border-color:#e8c84a; color:#e8c84a; }
.instr-btn.toggle-on {
background:#112211; border-color:#44aa66; color:#77dd99;
}
.instr-btn.toggle-on.selected {
background:#0d1f0d; border-color:#e8c84a; color:#e8c84a;
}

/* Conflict indicator dot */
.instr-btn .conf-dot {
position:absolute; top:3px; right:3px;
width:5px; height:5px; border-radius:50%;
}

/* Result panel */
.result-panel {
background:#111; border:1px solid #1e1e1e; border-radius:6px;
padding:13px 14px; margin-top:6px;
}
.rp-title {
font-size:0.75rem; font-weight:bold; color:#e8c84a;
margin-bottom:2px;
}
.rp-subtitle {
font-size:0.56rem; color:#555; margin-bottom:10px;
letter-spacing:0.5px;
}
.rp-section { margin-bottom:9px; }
.rp-section-title {
font-size:0.5rem; text-transform:uppercase; letter-spacing:1.2px;
margin-bottom:5px; font-weight:bold;
}
.rp-item {
font-size:0.62rem; line-height:1.7; color:#888; padding-left:4px;
}
.rp-item.good   { color:#55cc77; }
.rp-item.bad    { color:#ff6b6b; }
.rp-item.warn   { color:#e8c84a; }
.rp-item.tip    { color:#77aaff; }
.rp-item.ref    { color:#aa77ff; font-style:italic; }

/* Conflict cards */
.conflict-card {
background:#1a0d0d; border:1px solid #3a1111; border-radius:4px;
padding:7px 10px; margin-top:5px; font-size:0.58rem; color:#cc7777;
line-height:1.6;
}
.conflict-card .conf-title { color:#ff6b6b; font-size:0.52rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:3px; font-weight:bold; }

/* Active instruction summary bar */
.active-bar {
background:#141414; border:1px solid #222; border-radius:4px;
padding:6px 10px; font-size:0.58rem; color:#555;
display:flex; flex-wrap:wrap; gap:5px; align-items:center;
min-height:32px;
}
.active-tag {
background:#1a1a10; border:1px solid #444; border-radius:3px;
padding:2px 7px; font-size:0.56rem; color:#aaa;
display:flex; align-items:center; gap:4px;
}
.active-tag .atag-x { color:#555; cursor:pointer; margin-left:2px; }
.active-tag .atag-x:hover { color:#ff6b6b; }
.conflict-badge {
font-size:0.5rem; background:#3a1111; color:#ff8888;
border-radius:2px; padding:1px 4px;
}

.empty-state { color:#2a2a2a; font-size:0.65rem; text-align:center; padding:20px; }

/* Verdict panel */
.verd-card {
background:#111; border:1px solid #1e1e1e; border-radius:6px;
padding:12px 14px; margin-bottom:7px;
}
.verd-card .vc-title {
font-size:0.52rem; text-transform:uppercase; letter-spacing:1.2px;
font-weight:bold; margin-bottom:8px;
}
.verd-item { font-size:0.63rem; line-height:1.8; padding-left:4px; color:#888; }
.verd-item.pos  { color:#55cc77; }
.verd-item.neg  { color:#ff6b6b; }
.verd-item.warn { color:#e8c84a; }
.verd-item.tip  { color:#77aaff; }
.verd-item.ref  { color:#aa77ff; font-style:italic; }

.style-badge {
display:inline-block; padding:4px 12px; border-radius:4px;
font-size:0.75rem; font-weight:bold; letter-spacing:1px;
margin-bottom:8px;
}
.health-bar-wrap {
height:6px; background:#1a1a1a; border-radius:3px; margin:6px 0 10px;
}
.health-bar { height:100%; border-radius:3px; transition:width 0.5s; }

.verd-grid {
display:grid; grid-template-columns:1fr 1fr; gap:6px;
}
@media(max-width:480px){ .verd-grid { grid-template-columns:1fr; } }

.verd-empty {
color:#2a2a2a; font-size:0.65rem; text-align:center;
padding:28px; border:1px dashed #1a1a1a; border-radius:6px;
}
</style>

</head>
<body>

<h2>FM CONSEQUENCE ENGINE</h2>
<p class="subtitle w">Click any instruction to see what it does and what it breaks</p>

<!-- Active instructions summary -->

<div class="active-bar w" id="active-bar">
  <span style="color:#333;font-size:0.54rem">No instructions selected</span>
</div>

<!-- Category tabs -->

<div class="cat-tabs w">
  <div class="ctab active" onclick="setCategory('shape')">Shape</div>
  <div class="ctab" onclick="setCategory('defence')">Defence</div>
  <div class="ctab" onclick="setCategory('attack')">Attack</div>
  <div class="ctab" onclick="setCategory('verdict')" id="verdict-tab" style="border-color:#333;color:#444">⚖️ Verdict</div>
</div>

<!-- Instruction selector -->

<div class="w" id="instr-panel"></div>

<!-- Result panel (instruction detail) -->

<div class="w" id="result-panel">
  <div class="empty-state">Select an instruction above to see its consequences</div>
</div>

<!-- Verdict panel -->

<div class="w" id="verdict-panel" style="display:none"></div>

// ── Conflict detection ───────────────────────────────────────
function getConflicts(id) {
  const instr = INSTRUCTIONS[id];
  if(!instr) return [];
  // Find all selected instructions that conflict with this one
  return activeSelections.filter(sel => {
    const selInstr = INSTRUCTIONS[sel];
    return selInstr && (selInstr.conflicts||[]).includes(id) || (instr.conflicts||[]).includes(sel);
  });
}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let currentCategory = 'shape';
let selectedInstruction = null;
let activeSelections = {}; // sectionLabel → selected id (for sliders), or Set of ids (for toggles)

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function setCategory(cat) {
  currentCategory = cat;
  selectedInstruction = null;
  document.querySelectorAll('.ctab').forEach((t,i) => {
    t.classList.toggle('active', ['shape','defence','attack','verdict'][i]===cat);
  });
  const isVerdict = cat === 'verdict';
  document.getElementById('instr-panel').style.display    = isVerdict ? 'none' : 'block';
  document.getElementById('result-panel').style.display   = isVerdict ? 'none' : 'block';
  document.getElementById('verdict-panel').style.display  = isVerdict ? 'block' : 'none';
  if(isVerdict) renderVerdict();
  else { renderInstrPanel(); renderResult(); }
}

function renderInstrPanel() {
  const cat = CATEGORIES[currentCategory];
  const el = document.getElementById('instr-panel');
  el.innerHTML = cat.sections.map(sec => {
    const secId = sec.label;

    if(sec.type === 'row-pair') {
      // Final Third grid — two columns, three rows, pick one or none per row
      const rows = sec.rows.map((pair, rowIdx) => {
        return `<div class="instr-row" style="gap:3px;margin-bottom:3px">` +
          pair.map(id => {
            const instr = INSTRUCTIONS[id];
            if(!instr) return '';
            const rowKey = secId + '_row' + rowIdx;
            const isActive = activeSelections[rowKey] === id;
            const conflicts = getConflictsForButton(id);
            const hasConflict = conflicts.length > 0 && isActive;
            return `<div class="instr-btn${isActive?' toggle-on':''}${selectedInstruction===id?' selected':''}"
              style="flex:1"
              onclick="selectInstruction('${id}','${rowKey}',false)"
              title="${instr.label}">
              ${instr.label}
              ${hasConflict ? '<span class="conf-dot" style="background:#ff6b6b"></span>' : ''}
            </div>`;
          }).join('') +
        `</div>`;
      }).join('');
      return `<div class="instr-section">
        <div class="sec-label">${sec.label}</div>
        ${rows}
      </div>`;
    }

    // Standard slider or toggle
    const isToggle = sec.type === 'toggle';
    const btns = sec.options.map(id => {
      const instr = INSTRUCTIONS[id];
      if(!instr) return '';
      const isActive = isToggle
        ? (activeSelections[secId] && activeSelections[secId].has(id))
        : (activeSelections[secId] === id);
      const conflicts = getConflictsForButton(id);
      const hasConflict = conflicts.length > 0 && isActive;
      return `<div class="instr-btn${isActive?' toggle-on':''}${selectedInstruction===id?' selected':''}"
        onclick="selectInstruction('${id}','${secId}',${isToggle})"
        title="${instr.label}">
        ${instr.label}
        ${hasConflict ? '<span class="conf-dot" style="background:#ff6b6b"></span>' : ''}
      </div>`;
    }).join('');
    return `<div class="instr-section">
      <div class="sec-label">${sec.label}</div>
      <div class="instr-row">${btns}</div>
    </div>`;
  }).join('');
}

function getConflictsForButton(id) {
  const instr = INSTRUCTIONS[id];
  if(!instr) return [];
  const allActive = Object.values(activeSelections).flatMap(v =>
    v instanceof Set ? [...v] : (v ? [v] : [])
  );
  return allActive.filter(sel => sel !== id && (
    (INSTRUCTIONS[sel]?.conflicts||[]).includes(id) ||
    (instr.conflicts||[]).includes(sel)
  ));
}

function selectInstruction(id, secId, isToggle) {
  selectedInstruction = id;

  if(isToggle) {
    if(!activeSelections[secId]) activeSelections[secId] = new Set();
    if(activeSelections[secId].has(id)) activeSelections[secId].delete(id);
    else activeSelections[secId].add(id);
  } else {
    activeSelections[secId] = activeSelections[secId] === id ? null : id;
  }

  renderInstrPanel();
  renderResult();
  renderActiveBar();
}

function renderActiveBar() {
  const el = document.getElementById('active-bar');
  const allActive = Object.values(activeSelections).flatMap(v =>
    v instanceof Set ? [...v] : (v ? [v] : [])
  );

  // Update verdict tab to show it's ready
  const vTab = document.getElementById('verdict-tab');
  if(vTab) {
    if(allActive.length) {
      vTab.style.borderColor = '#e8c84a66';
      vTab.style.color = '#aaa';
    } else {
      vTab.style.borderColor = '#333';
      vTab.style.color = '#444';
    }
  }

  if(!allActive.length) {
    el.innerHTML = '<span style="color:#333;font-size:0.54rem">No instructions selected</span>';
    return;
  }
  el.innerHTML = allActive.map(id => {
    const instr = INSTRUCTIONS[id];
    const conflicts = getConflictsForButton(id);
    return `<div class="active-tag">
      ${instr?.label||id}
      ${conflicts.length ? `<span class="conflict-badge">⚡</span>` : ''}
      <span class="atag-x" onclick="clearInstruction('${id}')">✕</span>
    </div>`;
  }).join('');
}

function clearInstruction(id) {
  Object.keys(activeSelections).forEach(sec => {
    if(activeSelections[sec] instanceof Set) activeSelections[sec].delete(id);
    else if(activeSelections[sec] === id) activeSelections[sec] = null;
  });
  if(selectedInstruction === id) selectedInstruction = null;
  renderInstrPanel();
  renderResult();
  renderActiveBar();
}

function renderResult() {
  const el = document.getElementById('result-panel');
  if(!selectedInstruction) {
    el.innerHTML = '<div class="empty-state">Select an instruction above to see its consequences</div>';
    return;
  }
  const instr = INSTRUCTIONS[selectedInstruction];
  if(!instr) return;

  const conflicts = getConflictsForButton(selectedInstruction);
  const enabledActive = (instr.enables||[]).filter(e => {
    const allActive = Object.values(activeSelections).flatMap(v =>
      v instanceof Set ? [...v] : (v ? [v] : [])
    );
    return allActive.includes(e);
  });

  const conflictCards = conflicts.map(cid => {
    const ci = INSTRUCTIONS[cid];
    return `<div class="conflict-card">
      <div class="conf-title">⚡ Conflicts with: ${ci?.label||cid}</div>
      These two instructions pull in opposite directions. Having both active reduces the effectiveness of each.
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="result-panel">
      <div class="rp-title">${instr.label}</div>
      <div class="rp-subtitle">${currentCategory.toUpperCase()} INSTRUCTION</div>

      <div class="rp-section">
        <div class="rp-section-title" style="color:#77aaff">What it does</div>
        ${(instr.does||[]).map(d=>`<div class="rp-item">→ ${d}</div>`).join('')}
      </div>

      ${instr.tradeoffs?.length ? `
      <div class="rp-section">
        <div class="rp-section-title" style="color:#ff8855">Trade-offs</div>
        ${instr.tradeoffs.map(t=>`<div class="rp-item bad">⚠️ ${t}</div>`).join('')}
      </div>` : ''}

      ${instr.enables?.length ? `
      <div class="rp-section">
        <div class="rp-section-title" style="color:#55cc77">Works well with</div>
        ${instr.enables.map(e => {
          const ei = INSTRUCTIONS[e];
          const isOn = enabledActive.includes(e);
          return `<div class="rp-item ${isOn?'good':'tip'}">
            ${isOn?'✅':'→'} ${ei?.label||e}${isOn?' — already active':''}</div>`;
        }).join('')}
      </div>` : ''}

      ${instr.conflicts?.length ? `
      <div class="rp-section">
        <div class="rp-section-title" style="color:#ff6b6b">Conflicts with</div>
        ${instr.conflicts.map(c => {
          const ci = INSTRUCTIONS[c];
          const isOn = getConflictsForButton(selectedInstruction).includes(c);
          return `<div class="rp-item ${isOn?'bad':''}">
            ${isOn?'❌ ACTIVE —':' ✗'} ${ci?.label||c}</div>`;
        }).join('')}
      </div>` : ''}

      ${instr.attributes?.length ? `
      <div class="rp-section">
        <div class="rp-section-title" style="color:#e8c84a">Player attributes needed</div>
        ${instr.attributes.map(a=>`<div class="rp-item warn">• ${a}</div>`).join('')}
      </div>` : ''}

      ${instr.realworld ? `
      <div class="rp-section">
        <div class="rp-section-title" style="color:#aa77ff">Real world reference</div>
        <div class="rp-item ref">🎙 ${instr.realworld}</div>
      </div>` : ''}

      ${conflictCards}
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
// VERDICT ENGINE
// ═══════════════════════════════════════════════════════════════

function getAllActive() {
  return Object.values(activeSelections).flatMap(v =>
    v instanceof Set ? [...v] : (v ? [v] : [])
  );
}

function has(id) { return getAllActive().includes(id); }

function buildVerdict() {
  const active = getAllActive();

  // Always yield a verdict — even with nothing selected
  const noInstructions = active.length === 0;

  // ── Tactical health score ────────────────────────────────
  let totalConflicts = 0;
  active.forEach(id => { totalConflicts += getConflictsForButton(id).length; });
  totalConflicts = totalConflicts / 2;
  const healthPct = noInstructions ? 50 : Math.max(10, Math.round(100 - (totalConflicts * 18)));

  // ── Style identity ────────────────────────────────────────
  let style = 'Undefined'; let styleColor = '#666'; let styleDesc = '';

  const isHigh    = has('dline-high') || has('close-allover');
  const isDeep    = has('dline-deep') || has('close-sit');
  const isDirect  = has('pass-direct') || has('pass-long') || has('through-balls');
  const isShort   = has('pass-short') || has('work-into-box');
  const isFast    = has('tempo-fast') || has('run-at-defence');
  const isSlow    = has('tempo-slow');
  const isWide    = has('width-wide') || has('early-crosses') || has('look-overlap');
  const isNarrow  = has('width-narrow') || has('focus-centre');
  const isCounter = has('counter') || has('gk-short') || has('through-balls');
  const isAttk    = has('attacking') || has('overload');
  const isDef     = has('defensive') || has('contain');
  const hasAny    = active.length > 0;

  // Contradictory combos get their own identity — don't crash, name the chaos
  const isContradictory = (isHigh && isDeep) || (isDef && isAttk) ||
    (has('tempo-fast') && has('tempo-slow')) || (has('close-allover') && has('close-sit'));

  if(noInstructions)                                { style='No Instructions'; styleColor='#444'; styleDesc='Pick instructions in Shape, Defence, and Attack to see your tactical identity'; }
  else if(isContradictory)                          { style='Contradictory';   styleColor='#ff3333'; styleDesc='Conflicting instructions pulling in opposite directions — pick a clearer direction'; }
  else if(has('overload'))                          { style='Total Attack';       styleColor='#ff3333'; styleDesc='Maximum commitment forward — dangerous and open'; }
  else if(has('attacking') && isHigh && isFast)     { style='High Press / Gegenpress'; styleColor='#ff6644'; styleDesc='Win it high, play it fast, press immediately'; }
  else if(has('attacking') && isWide)               { style='Expansive Attack';   styleColor='#ff8844'; styleDesc='Wide, aggressive, looking to create from all areas'; }
  else if(has('attacking'))                         { style='Attacking';          styleColor='#ff9944'; styleDesc='Forward-oriented, accept defensive risk'; }
  else if(isDeep && isCounter && isDirect)          { style='Counter-Attack';     styleColor='#cc44ff'; styleDesc='Absorb, win the ball, release quickly in behind'; }
  else if(isDeep && isDef)                          { style='Low Block';           styleColor='#5577cc'; styleDesc='Compact, organised, hard to beat'; }
  else if(isShort && isSlow && !isHigh)             { style='Possession';         styleColor='#00dd77'; styleDesc='Patient, technical, control through the ball'; }
  else if(isShort && has('control'))                { style='Controlled Possession'; styleColor='#44ddcc'; styleDesc='Structured possession with organised pressing'; }
  else if(isHigh && isShort)                        { style='Positional Play';    styleColor='#33aaff'; styleDesc='Press high, play short, dominate territory'; }
  else if(isHigh && isDirect)                       { style='High Press / Direct';styleColor='#ffcc00'; styleDesc='Win it high and go direct when you have it'; }
  else if(isHigh)                                   { style='High Block';          styleColor='#ffaa44'; styleDesc='Aggressive defensive line, compact shape'; }
  else if(isDirect && isFast)                       { style='Direct / Vertical';  styleColor='#ff6600'; styleDesc='Fast, forward, minimal time on the ball'; }
  else if(isDef)                                    { style='Defensive';          styleColor='#5577cc'; styleDesc='Cautious, organised, hard to break down'; }
  else if(has('balanced'))                          { style='Balanced';           styleColor='#888888'; styleDesc='No strong identity — adaptable'; }
  else                                              { style='Mixed';              styleColor='#666666'; styleDesc='Multiple layers active — define a clearer core identity'; }

  // ── Attacking profile ─────────────────────────────────────
  const atkProfile = [];
  if(has('early-crosses'))   atkProfile.push('Wide early deliveries — targets aerial forwards');
  if(has('look-overlap'))    atkProfile.push('Overlapping fullbacks — creates 2v1 on the flank');
  if(has('through-balls'))   atkProfile.push('Balls in behind — exploits high lines and space');
  if(has('run-at-defence'))  atkProfile.push('Dribbles and 1v1s — individual skill in final third');
  if(has('shoot-on-sight'))  atkProfile.push('Shots from range — volume over quality');
  if(has('work-into-box'))   atkProfile.push('Patient build-up — quality over quantity of chances');
  if(has('focus-left'))      atkProfile.push('Left-channel overload — everything through the left');
  if(has('focus-right'))     atkProfile.push('Right-channel overload — everything through the right');
  if(has('focus-centre'))    atkProfile.push('Central overload — tight passing combinations through the middle');
  if(has('focus-flanks'))    atkProfile.push('Dual flank width — stretches opposition simultaneously');
  if(has('pass-long'))       atkProfile.push('Long diagonal switches — changes point of attack quickly');
  if(has('pass-direct'))     atkProfile.push('Direct passing — skips midfield, quick vertical play');
  if(has('gk-long'))         atkProfile.push('GK launches long — bypasses press, targets aerial players');
  if(!atkProfile.length)     atkProfile.push('No clear attacking instruction — relies on individual decisions');

  // ── Defensive profile ─────────────────────────────────────
  const defProfile = [];
  if(has('dline-high'))        defProfile.push('High line — compact shape, catches attackers offside');
  if(has('dline-deep'))        defProfile.push('Deep line — sits back, absorbs, hard to get behind');
  if(has('close-allover'))     defProfile.push('High press — wins ball in dangerous positions');
  if(has('close-sit'))         defProfile.push('Passive block — let them come, hold shape');
  if(has('close-ownhalf'))     defProfile.push('Mid-block — presses only when ball enters own half');
  if(has('offside-yes'))       defProfile.push('Coordinated offside trap — requires total sync');
  if(has('tackle-committed'))  defProfile.push('Aggressive tackling — physical, risky, wins duels');
  if(has('tackle-cautious'))   defProfile.push('Jockeying — patient defending, avoids fouls');
  if(has('waste-yes'))         defProfile.push('Time wasting — slows game down when protecting a lead');
  if(!defProfile.length)       defProfile.push('No strong defensive instruction — standard shape');

  // ── Vulnerabilities ───────────────────────────────────────
  const vulns = [];
  if(has('dline-high') && !has('offside-yes'))
    vulns.push('Pace in behind — fast striker can run onto through balls past your high line');
  if(has('dline-high') && has('offside-yes'))
    vulns.push('Mistimed offside trap — one defender out of sync = clean through ball');
  if(has('dline-deep') || has('close-sit'))
    vulns.push('Patient build-up teams — given time and space in front of your block');
  if(has('width-wide') || has('look-overlap'))
    vulns.push('Central counter-attacks — large gaps between players in transition');
  if(has('width-narrow') || has('focus-centre'))
    vulns.push('Wide play — flanks are open, crosses will come freely');
  if(has('close-allover') || has('attacking'))
    vulns.push('Ball over the press — technical team plays through your press easily');
  if(has('tempo-fast') || has('run-at-defence'))
    vulns.push('Strong physical defenders — aggressive dribblers are robbed and countered');
  if(has('through-balls') && has('pass-direct'))
    vulns.push('Interception-based teams — direct play is read and cut out by organised midfields');
  if(has('shoot-on-sight'))
    vulns.push('Poor shooting quality wastes possession — gives organised teams easy transitions');
  if(has('freedom-expressive'))
    vulns.push('Shape collapses — players go freelance and defensive structure breaks');
  if(has('overload') || (has('attacking') && has('close-allover')))
    vulns.push('Any counterattack — no cover behind, one turnover = clear chance');
  if(has('tackle-committed'))
    vulns.push('Technical players who draw fouls — yellow card accumulation');
  if(has('offside-yes') && !has('dline-high'))
    vulns.push('Offside trap without a high line is inconsistent — defenders not in sync');

  // ── Opponent profile that beats this ─────────────────────
  const beatenBy = [];
  if(isHigh && has('close-allover'))
    beatenBy.push('A team with a calm technical midfielder who can break a press — gets behind your high line');
  if(isDeep && isDef)
    beatenBy.push('Patient possession teams with Through Balls — pick apart the block slowly');
  if(isCounter && isDirect)
    beatenBy.push('Teams that press high and prevent your build-up — your counter needs space to work');
  if(isWide)
    beatenBy.push('Narrow defensive blocks with strong CBs and aerial ability — nullify your crosses');
  if(has('shoot-on-sight'))
    beatenBy.push('Teams with a dominant goalkeeper and organised backline who soak up low-quality shots');
  if(has('freedom-expressive'))
    beatenBy.push('Disciplined, organised pressing teams — they win the ball when your shape breaks');
  if(has('work-into-box') && isSlow)
    beatenBy.push('Well-organised deep blocks — patient play runs out of ideas against 10 behind the ball');
  if(!atkProfile.length) atkProfile.push(noInstructions ? 'No attacking instructions selected yet' : 'No clear attacking instruction — relies on individual decisions');
  if(!defProfile.length) defProfile.push(noInstructions ? 'No defensive instructions selected yet' : 'No strong defensive instruction — standard shape');
  if(!vulns.length)      vulns.push('No specific vulnerabilities identified from current instructions');
  if(!beatenBy.length)   beatenBy.push('Balanced setup — no single opponent type specifically exploits your shape');

  // ── Conflict pairs ────────────────────────────────────────
  const conflictPairs = [];
  active.forEach(id => {
    getConflictsForButton(id).forEach(cid => {
      const key = [id,cid].sort().join('|');
      if(!conflictPairs.find(p=>p.key===key))
        conflictPairs.push({key, a:INSTRUCTIONS[id]?.label||id, b:INSTRUCTIONS[cid]?.label||cid});
    });
  });

  return {
    style, styleColor, styleDesc,
    healthPct, conflictPairs,
    atkProfile, defProfile, vulns, beatenBy,
    activeCount: active.length,
    noInstructions,
  };
}

function renderVerdict() {
  const el = document.getElementById('verdict-panel');
  if(!el) return;
  const v = buildVerdict();

  if(!v) {
    el.innerHTML = '<div class="verd-empty">Select instructions in Shape, Defence, and Attack — then come back here for your verdict</div>';
    return;
  }

  const hColor = v.healthPct >= 70 ? '#55cc77' : v.healthPct >= 45 ? '#e8c84a' : '#ff6b6b';
  const hLabel = v.healthPct >= 70 ? 'Coherent' : v.healthPct >= 45 ? 'Some conflicts' : 'Contradictory';

  el.innerHTML = `
    <!-- Style identity -->
    <div class="verd-card" style="border-color:${v.styleColor}33">
      <div class="vc-title" style="color:${v.styleColor}">🎯 Tactical Identity</div>
      <div class="style-badge" style="background:${v.styleColor}22;border:1px solid ${v.styleColor};color:${v.styleColor}">${v.style}</div>
      <div class="verd-item" style="color:#aaa">${v.styleDesc}</div>
    </div>

    <!-- Tactical health -->
    <div class="verd-card" style="border-color:${hColor}33">
      <div class="vc-title" style="color:${hColor}">🔧 Tactical Coherence — ${hLabel} (${v.healthPct}%)</div>
      <div class="health-bar-wrap">
        <div class="health-bar" style="width:${v.healthPct}%;background:${hColor}"></div>
      </div>
      ${v.conflictPairs.length
        ? v.conflictPairs.map(p=>`<div class="verd-item neg">⚡ ${p.a} conflicts with ${p.b}</div>`).join('')
        : '<div class="verd-item pos">✅ No active conflicts — shape is internally consistent</div>'
      }
    </div>

    <!-- Attack + Defence grid -->
    <div class="verd-grid">
      <div class="verd-card">
        <div class="vc-title" style="color:#55cc77">⚽ How you\'ll score</div>
        ${v.atkProfile.map(a=>`<div class="verd-item pos">→ ${a}</div>`).join('')}
      </div>
      <div class="verd-card">
        <div class="vc-title" style="color:#77aaff">🛡 How you\'ll defend</div>
        ${v.defProfile.map(d=>`<div class="verd-item tip">→ ${d}</div>`).join('')}
      </div>
    </div>

    <!-- Vulnerabilities -->
    <div class="verd-card" style="border-color:#3a1111">
      <div class="vc-title" style="color:#ff6b6b">⚠️ Vulnerabilities</div>
      ${v.vulns.length
        ? v.vulns.map(u=>`<div class="verd-item neg">• ${u}</div>`).join('')
        : '<div class="verd-item" style="color:#444">No specific vulnerabilities identified</div>'
      }
    </div>

    <!-- Beaten by -->
    <div class="verd-card" style="border-color:#33112a">
      <div class="vc-title" style="color:#cc77ff">👁 What beats this setup</div>
      ${v.beatenBy.map(b=>`<div class="verd-item ref">• ${b}</div>`).join('')}
    </div>

  `;
}

renderInstrPanel();
renderResult();
renderActiveBar();
</script>

<script>
if('serviceWorker' in navigator) {
  const sw = `
    const CACHE = 'fm-tools-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', self.location.href])));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
        const clone = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
        return res;
      }).catch(() => caches.match('./'))));
    });
  `;
  const blob = new Blob([sw], {type:'application/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).then(() => URL.revokeObjectURL(url));
}
</script>
